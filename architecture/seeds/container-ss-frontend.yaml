apiVersion: synthesis/v1
kind: architecture.container
metadata:
  name: ss-frontend
spec:
  displayName: "Frontend SPA"
  description: "Single-page React application providing the domain editor UI, C4 diagram viewer, developer tools, and OIDC authentication flow. Communicates with the backend exclusively via MCP JSON-RPC over HTTP."
  technology: "React / TypeScript / Vite"
  systemRef: "!name synthesis"
  usesRefs:
    - "!name ss-backend"
