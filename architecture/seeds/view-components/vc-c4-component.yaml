apiVersion: synthesis/v1
kind: system.view-component
metadata:
  name: vc-c4-component
spec:
  displayName: "C4 Component Diagram"
  description: "C4 model Level 3 — shows components within a container"
  layoutType: c4-component
  icon: cpu
  componentKind: inline-react
  requiredFields:
    - name: containerRef
      type: ref
  defaultLayoutConfig:
    componentKind: architecture.component
    containerKind: architecture.container
  defaultItemGroup:
    kinds:
      - architecture.component
      - architecture.container
markdown: |
  var h = React.createElement;

  function getName(item) { return item.spec.displayName || item.metadata.name; }

  function resolveRefs(refs, allItems) {
    if (!refs || !refs.length) return [];
    var result = [];
    for (var i = 0; i < allItems.length; i++) {
      if (refs.indexOf(allItems[i].metadata.uid) !== -1) result.push(allItems[i]);
    }
    return result;
  }

  return function C4ComponentDiagram(props) {
    var config = props.config;
    var items = props.items;
    var onDrillDown = props.onDrillDown;
    var onInspect = props.onInspect;

    var componentKind = config.componentKind || 'architecture.component';
    var containerKind = config.containerKind || 'architecture.container';

    var components = (items && items[componentKind]) || [];
    var containers = (items && items[containerKind]) || [];

    var focusContainer = config.focusRef
      ? containers.find(function(c) { return c.metadata.uid === config.focusRef; })
      : containers[0];

    var boundaryComponents = focusContainer
      ? components.filter(function(c) { return c.spec.containerRef === focusContainer.metadata.uid; })
      : components;

    function handleClick(item) {
      if (onInspect) onInspect(item.metadata.uid, item.kind);
    }

    if (!components.length) {
      return h('div', { className: 'flex items-center justify-center h-64 text-muted-foreground text-sm' },
        'No components found.'
      );
    }

    return h('div', { className: 'flex flex-col items-center gap-8 p-6' },
      focusContainer ? h('div', { className: 'w-full max-w-4xl' },
        h('div', {
          className: 'rounded-xl border-2 border-dashed border-violet-300/50 bg-violet-50/5 p-6'
        },
          h('div', { className: 'text-xs font-semibold uppercase tracking-wider text-violet-400 mb-4' },
            getName(focusContainer) + ' [Container]'
          ),
          h('div', { className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4' },
            boundaryComponents.map(function(comp) {
              var usesNames = resolveRefs(comp.spec.usesRefs, components).map(getName);
              return h('div', {
                key: comp.metadata.uid,
                className: 'rounded-lg border bg-card p-4 cursor-pointer transition-shadow hover:shadow-lg',
                style: { borderTopWidth: '3px', borderTopColor: '#8b5cf6' },
                onClick: function() { handleClick(comp); }
              },
                h('div', { className: 'text-[10px] uppercase tracking-wider text-muted-foreground mb-1' }, 'Component'),
                h('div', { className: 'text-sm font-semibold mb-1' }, getName(comp)),
                comp.spec.description ? h('div', { className: 'text-xs text-muted-foreground line-clamp-2 mb-2' }, comp.spec.description) : null,
                comp.spec.technology ? h('div', { className: 'text-[10px] text-muted-foreground mb-2' }, '[' + comp.spec.technology + ']') : null,
                usesNames.length ? h('div', { className: 'flex flex-wrap gap-1' },
                  usesNames.map(function(name) {
                    return h('span', { key: name, className: 'text-[10px] bg-muted rounded px-1.5 py-0.5' }, 'uses ' + name);
                  })
                ) : null
              );
            })
          )
        )
      ) : null
    );
  };
