apiVersion: synthesis/v1
kind: system.view-component
metadata:
  name: vc-c4-context
spec:
  displayName: "C4 Context Diagram"
  description: "C4 model Level 1 — shows a system in context with its users and external systems"
  layoutType: c4-context
  icon: network
  componentKind: inline-react
  requiredFields:
    - name: usesRefs
      type: ref-list
  defaultItemGroup:
    kinds:
      - architecture.system
      - architecture.person
      - architecture.external-system
  defaultDrillDown:
    - nodeKind: architecture.system
      targetViewComponent: vc-c4-container
markdown: |
  var h = React.createElement;
  var NODE_W = 220;
  var NODE_H = 120;
  var EDGE_STYLE = { stroke: 'hsl(var(--diagram-edge))', strokeWidth: 1.5, vectorEffect: 'non-scaling-stroke' };
  var EDGE_LABEL_STYLE = { fontSize: 11, fill: 'hsl(var(--diagram-edge-label))' };
  var HANDLE_STYLE = { background: 'transparent', border: 0, width: 12, height: 12 };

  function getName(item) { return item.spec.displayName || item.metadata.name; }

  function makeEdge(source, target) {
    return { id: source + '->' + target, source: source, target: target, label: 'Uses', type: 'default', style: EDGE_STYLE, labelStyle: EDGE_LABEL_STYLE, markerEnd: { type: MarkerType.ArrowClosed, color: 'hsl(var(--diagram-edge))' } };
  }

  function AllHandles() {
    return h(React.Fragment, null,
      h(Handle, { type: 'target', position: Position.Top, style: HANDLE_STYLE }),
      h(Handle, { type: 'source', position: Position.Bottom, style: HANDLE_STYLE }),
      h(Handle, { type: 'target', position: Position.Left, id: 'left', style: HANDLE_STYLE }),
      h(Handle, { type: 'source', position: Position.Right, id: 'right', style: HANDLE_STYLE })
    );
  }

  function SystemNodeType(props) {
    var data = props.data;
    return h('div', { className: 'c4-node c4-system-node', style: { '--c4-color': data.color } },
      h(AllHandles),
      h('div', { className: 'c4-node-label' }, data.label),
      data.technology ? h('div', { className: 'c4-node-tech' }, '[' + data.technology + ']') : null,
      data.description ? h('div', { className: 'c4-node-desc' }, data.description) : null
    );
  }

  function PersonNodeType(props) {
    var data = props.data;
    return h('div', { className: 'c4-node c4-person-node', style: { '--c4-color': data.color } },
      h(AllHandles),
      h('div', { className: 'c4-person-head' }),
      h('div', { className: 'c4-node-label' }, data.label),
      data.description ? h('div', { className: 'c4-node-desc' }, data.description) : null
    );
  }

  function ExternalNodeType(props) {
    var data = props.data;
    return h('div', { className: 'c4-node c4-external-node', style: { '--c4-color': data.color } },
      h(AllHandles),
      h('div', { className: 'c4-node-stereotype' }, '[External]'),
      h('div', { className: 'c4-node-label' }, data.label),
      data.technology ? h('div', { className: 'c4-node-tech' }, '[' + data.technology + ']') : null,
      data.description ? h('div', { className: 'c4-node-desc' }, data.description) : null
    );
  }

  var nodeTypes = { system: SystemNodeType, person: PersonNodeType, external: ExternalNodeType };

  return function C4ContextDiagram(props) {
    var config = props.config || {};
    var items = props.items || {};
    var onDrillDown = props.onDrillDown;
    var onInspect = props.onInspect;

    var systemColor = config.systemColor || '#6366f1';
    var personColor = config.personColor || '#0891b2';
    var externalColor = config.externalColor || '#94a3b8';

    var legendState = useState({});
    var hiddenKinds = legendState[0];
    var setHiddenKinds = legendState[1];

    function toggleKind(kind) {
      setHiddenKinds(function(prev) {
        var next = Object.assign({}, prev);
        if (next[kind]) delete next[kind];
        else next[kind] = true;
        return next;
      });
    }

    var systems = hiddenKinds['architecture.system'] ? [] : (items['architecture.system'] || []);
    var people = hiddenKinds['architecture.person'] ? [] : (items['architecture.person'] || []);
    var externals = hiddenKinds['architecture.external-system'] ? [] : (items['architecture.external-system'] || []);

    var allSystems = items['architecture.system'] || [];
    var allPeople = items['architecture.person'] || [];
    var allExternals = items['architecture.external-system'] || [];

    var built = useMemo(function() {
      var nodes = [];
      var edges = [];
      var kindMap = {};
      var cx = 400;
      var cy = 300;

      systems.forEach(function(sys, i) {
        var isFocus = config.focusRef === sys.metadata.uid;
        nodes.push({ id: sys.metadata.uid, type: 'system', position: { x: isFocus ? cx - NODE_W / 2 : cx - NODE_W / 2 + (i + 1) * 260, y: cy - NODE_H / 2 }, data: { label: getName(sys), description: sys.spec.description, technology: sys.spec.technology, color: systemColor, stereotype: 'Software System' } });
        kindMap[sys.metadata.uid] = 'architecture.system';
        (sys.spec.usesRefs || []).forEach(function(ref) { edges.push(makeEdge(sys.metadata.uid, ref)); });
      });

      var pCols = Math.min(people.length, 4);
      var pSpacing = 260;
      var pRowSpacing = 180;
      var pStartX = cx - ((pCols - 1) * pSpacing) / 2 - NODE_W / 2;
      var pRows = Math.ceil(people.length / pCols);
      var pBlockH = pRows * pRowSpacing;
      people.forEach(function(p, i) {
        var col = i % pCols;
        var row = Math.floor(i / pCols);
        nodes.push({ id: p.metadata.uid, type: 'person', position: { x: pStartX + col * pSpacing, y: cy - pBlockH - 60 + row * pRowSpacing }, data: { label: getName(p), description: p.spec.description, color: personColor } });
        kindMap[p.metadata.uid] = 'architecture.person';
        (p.spec.usesRefs || []).forEach(function(ref) { edges.push(makeEdge(p.metadata.uid, ref)); });
      });

      var extSpacing = 280;
      var extStartX = cx - ((externals.length - 1) * extSpacing) / 2 - NODE_W / 2;
      externals.forEach(function(ext, i) {
        nodes.push({ id: ext.metadata.uid, type: 'external', position: { x: extStartX + i * extSpacing, y: cy + 240 }, data: { label: getName(ext), description: ext.spec.description, technology: ext.spec.technology, color: externalColor, stereotype: 'External System' } });
        kindMap[ext.metadata.uid] = 'architecture.external-system';
      });

      return { nodes: nodes, edges: edges, kindMap: kindMap };
    }, [systems, people, externals, config.focusRef]);

    var nodesState = useNodesState(built.nodes);
    var edgesState = useEdgesState(built.edges);
    var nodes = nodesState[0], setNodes = nodesState[1], onNodesChange = nodesState[2];
    var edges = edgesState[0], setEdges = edgesState[1], onEdgesChange = edgesState[2];

    useEffect(function() { setNodes(built.nodes); }, [built.nodes]);
    useEffect(function() { setEdges(built.edges); }, [built.edges]);

    var handleNodeClick = useCallback(function(event, node) {
      var kind = built.kindMap[node.id];
      if (!kind) return;
      if (onDrillDown) onDrillDown(node.id, kind);
      else if (onInspect) onInspect(node.id, kind);
    }, [built.kindMap, onDrillDown, onInspect]);

    if (!allSystems.length && !allPeople.length && !allExternals.length) {
      return h('div', { className: 'flex items-center justify-center h-64 text-muted-foreground text-sm' }, 'No architecture items found.');
    }

    var totalFiltered = systems.length + people.length + externals.length;

    return h('div', { style: { position: 'relative', width: '100%', height: 'calc(100vh - 220px)', minHeight: 400 } },
      h('div', { className: 'absolute top-3 left-3 z-20 bg-background/80 backdrop-blur-sm rounded-lg px-3 py-1.5 border border-border/50 shadow-sm flex items-center gap-2 flex-wrap' },
        h('button', { onClick: function() { toggleKind('architecture.system'); }, className: 'flex items-center gap-1.5 transition-opacity ' + (hiddenKinds['architecture.system'] ? 'opacity-30' : 'opacity-100') + ' hover:opacity-70', style: { cursor: 'pointer', background: 'none', border: 'none', padding: 0 } },
          h('div', { className: 'w-2 h-2 rounded-full', style: { backgroundColor: systemColor } }),
          h('span', { className: 'text-[11px] font-mono text-muted-foreground select-none' }, allSystems.length + ' system' + (allSystems.length !== 1 ? 's' : ''))
        ),
        h('button', { onClick: function() { toggleKind('architecture.person'); }, className: 'flex items-center gap-1.5 transition-opacity ' + (hiddenKinds['architecture.person'] ? 'opacity-30' : 'opacity-100') + ' hover:opacity-70', style: { cursor: 'pointer', background: 'none', border: 'none', padding: 0 } },
          h('div', { className: 'w-2 h-2 rounded-full', style: { backgroundColor: personColor } }),
          h('span', { className: 'text-[11px] font-mono text-muted-foreground select-none' }, allPeople.length + ' people')
        ),
        h('button', { onClick: function() { toggleKind('architecture.external-system'); }, className: 'flex items-center gap-1.5 transition-opacity ' + (hiddenKinds['architecture.external-system'] ? 'opacity-30' : 'opacity-100') + ' hover:opacity-70', style: { cursor: 'pointer', background: 'none', border: 'none', padding: 0 } },
          h('div', { className: 'w-2 h-2 rounded-full', style: { backgroundColor: externalColor } }),
          h('span', { className: 'text-[11px] font-mono text-muted-foreground select-none' }, allExternals.length + ' external' + (allExternals.length !== 1 ? 's' : ''))
        ),
        h('span', { className: 'text-[11px] text-border mx-0.5 select-none' }, '|'),
        h('span', { className: 'text-[11px] font-mono text-muted-foreground select-none' }, totalFiltered + ' total')
      ),
      h('div', { className: 'c4-context-canvas', style: { width: '100%', height: '100%' } },
        h(ReactFlow, { nodes: nodes, edges: edges, onNodesChange: onNodesChange, onEdgesChange: onEdgesChange, onNodeClick: handleNodeClick, nodeTypes: nodeTypes, fitView: true, fitViewOptions: { padding: 0.3 }, proOptions: { hideAttribution: true }, minZoom: 0.3, maxZoom: 2 },
          h(Background, { variant: 'dots', gap: 24, size: 1, color: 'hsl(var(--canvas-dots) / 0.2)' })
        )
      )
    );
  };
