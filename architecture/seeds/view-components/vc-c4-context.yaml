apiVersion: synthesis/v1
kind: system.view-component
metadata:
  name: vc-c4-context
spec:
  displayName: "C4 Context Diagram"
  description: "C4 model Level 1 — shows a system in context with its users and external systems"
  layoutType: c4-context
  icon: network
  componentKind: inline-react
  requiredFields:
    - name: usesRefs
      type: ref-list
  defaultItemGroup:
    kinds:
      - architecture.system
      - architecture.person
      - architecture.external-system
  defaultDrillDown:
    - nodeKind: architecture.system
      targetViewComponent: vc-c4-container
markdown: |
  var h = React.createElement;

  function getName(item) { return item.spec.displayName || item.metadata.name; }

  function resolveRefs(refs, allItems) {
    if (!refs || !refs.length) return [];
    var result = [];
    for (var i = 0; i < allItems.length; i++) {
      if (refs.indexOf(allItems[i].metadata.uid) !== -1) {
        result.push(allItems[i]);
      }
    }
    return result;
  }

  function C4Node(nodeProps) {
    var item = nodeProps.item;
    var color = nodeProps.color;
    var stereotype = nodeProps.stereotype;
    var onClick = nodeProps.onClick;
    var usesNames = nodeProps.usesNames;
    return h('div', {
      className: 'rounded-lg border bg-card p-4 cursor-pointer transition-shadow hover:shadow-lg w-56',
      style: { borderTopWidth: '3px', borderTopColor: color },
      onClick: onClick
    },
      h('div', { className: 'text-[10px] uppercase tracking-wider text-muted-foreground mb-1' }, stereotype),
      h('div', { className: 'text-sm font-semibold mb-1' }, getName(item)),
      item.spec.description ? h('div', { className: 'text-xs text-muted-foreground line-clamp-2 mb-2' }, item.spec.description) : null,
      item.spec.technology ? h('div', { className: 'text-[10px] text-muted-foreground' }, '[' + item.spec.technology + ']') : null,
      usesNames && usesNames.length ? h('div', { className: 'mt-2 flex flex-wrap gap-1' },
        usesNames.map(function(name) {
          return h('span', { key: name, className: 'text-[10px] bg-muted rounded px-1.5 py-0.5' }, 'uses ' + name);
        })
      ) : null
    );
  }

  return function C4ContextDiagram(props) {
    var config = props.config;
    var items = props.items;
    var onDrillDown = props.onDrillDown;
    var onInspect = props.onInspect;

    var systems = (items && items['architecture.system']) || [];
    var people = (items && items['architecture.person']) || [];
    var externals = (items && items['architecture.external-system']) || [];
    var allItems = systems.concat(people).concat(externals);

    var focusRef = config.focusRef;
    var focusSystems = focusRef ? systems.filter(function(s) { return s.metadata.uid === focusRef; }) : systems;
    var otherSystems = focusRef ? systems.filter(function(s) { return s.metadata.uid !== focusRef; }) : [];

    function handleClick(item) {
      if (onDrillDown) onDrillDown(item.metadata.uid, item.kind);
      else if (onInspect) onInspect(item.metadata.uid, item.kind);
    }

    if (!systems.length && !people.length && !externals.length) {
      return h('div', { className: 'flex items-center justify-center h-64 text-muted-foreground text-sm' },
        'No architecture items found.'
      );
    }

    return h('div', { className: 'flex flex-col items-center gap-8 p-6' },
      people.length ? h('div', null,
        h('div', { className: 'text-xs font-semibold uppercase tracking-wider text-muted-foreground text-center mb-3' }, 'People'),
        h('div', { className: 'flex flex-wrap justify-center gap-4' },
          people.map(function(p) {
            var usesNames = resolveRefs(p.spec.usesRefs, allItems).map(getName);
            return h(C4Node, { key: p.metadata.uid, item: p, color: '#0891b2', stereotype: 'Person', onClick: function() { handleClick(p); }, usesNames: usesNames });
          })
        )
      ) : null,

      h('div', null,
        h('div', { className: 'text-xs font-semibold uppercase tracking-wider text-muted-foreground text-center mb-3' }, 'Systems'),
        h('div', { className: 'flex flex-wrap justify-center gap-4' },
          focusSystems.map(function(s) {
            var usesNames = resolveRefs(s.spec.usesRefs, allItems).map(getName);
            return h(C4Node, { key: s.metadata.uid, item: s, color: '#6366f1', stereotype: 'Software System', onClick: function() { handleClick(s); }, usesNames: usesNames });
          }),
          otherSystems.map(function(s) {
            var usesNames = resolveRefs(s.spec.usesRefs, allItems).map(getName);
            return h(C4Node, { key: s.metadata.uid, item: s, color: '#818cf8', stereotype: 'Software System', onClick: function() { handleClick(s); }, usesNames: usesNames });
          })
        )
      ),

      externals.length ? h('div', null,
        h('div', { className: 'text-xs font-semibold uppercase tracking-wider text-muted-foreground text-center mb-3' }, 'External Systems'),
        h('div', { className: 'flex flex-wrap justify-center gap-4' },
          externals.map(function(e) {
            return h(C4Node, { key: e.metadata.uid, item: e, color: '#94a3b8', stereotype: 'External System', onClick: function() { handleClick(e); } });
          })
        )
      ) : null
    );
  };
