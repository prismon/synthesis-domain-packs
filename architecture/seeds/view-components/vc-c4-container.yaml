apiVersion: synthesis/v1
kind: system.view-component
metadata:
  name: vc-c4-container
spec:
  displayName: "C4 Container Diagram"
  description: "C4 model Level 2 — shows containers within a system"
  layoutType: c4-container
  icon: boxes
  componentKind: inline-react
  requiredFields:
    - name: systemRef
      type: ref
  defaultLayoutConfig:
    containerKind: architecture.container
    systemKind: architecture.system
    externalSystemKind: architecture.external-system
  defaultItemGroup:
    kinds:
      - architecture.container
      - architecture.system
      - architecture.external-system
  defaultDrillDown:
    - nodeKind: architecture.container
      targetViewComponent: vc-c4-component
markdown: |
  var h = React.createElement;
  var NODE_W = 220;
  var COL_SPACING = 260;
  var ROW_SPACING = 200;
  var BOUNDARY_PAD = 60;
  var EDGE_STYLE = { stroke: 'hsl(var(--diagram-edge))', strokeWidth: 1.5, vectorEffect: 'non-scaling-stroke' };
  var EDGE_LABEL_STYLE = { fontSize: 11, fill: 'hsl(var(--diagram-edge-label))' };
  var HANDLE_STYLE = { background: 'transparent', border: 0, width: 12, height: 12 };

  function getName(item) { return item.spec.displayName || item.metadata.name; }

  function makeEdge(source, target) {
    return { id: source + '->' + target, source: source, target: target, label: 'Uses', type: 'default', style: EDGE_STYLE, labelStyle: EDGE_LABEL_STYLE, markerEnd: { type: MarkerType.ArrowClosed, color: 'hsl(var(--diagram-edge))' } };
  }

  function AllHandles() {
    return h(React.Fragment, null,
      h(Handle, { type: 'target', position: Position.Top, style: HANDLE_STYLE }),
      h(Handle, { type: 'source', position: Position.Bottom, style: HANDLE_STYLE }),
      h(Handle, { type: 'target', position: Position.Left, id: 'left', style: HANDLE_STYLE }),
      h(Handle, { type: 'source', position: Position.Right, id: 'right', style: HANDLE_STYLE })
    );
  }

  function ContainerNodeType(props) {
    var data = props.data;
    return h('div', { className: 'c4-node c4-container-node', style: { '--c4-color': data.color } },
      h(AllHandles),
      h('div', { className: 'c4-node-stereotype' }, '[Container]'),
      h('div', { className: 'c4-node-label' }, data.label),
      data.technology ? h('div', { className: 'c4-node-tech' }, '[' + data.technology + ']') : null,
      data.description ? h('div', { className: 'c4-node-desc' }, data.description) : null
    );
  }

  function ExternalNodeType(props) {
    var data = props.data;
    return h('div', { className: 'c4-node c4-external-node', style: { '--c4-color': data.color } },
      h(AllHandles),
      h('div', { className: 'c4-node-stereotype' }, '[External]'),
      h('div', { className: 'c4-node-label' }, data.label),
      data.technology ? h('div', { className: 'c4-node-tech' }, '[' + data.technology + ']') : null,
      data.description ? h('div', { className: 'c4-node-desc' }, data.description) : null
    );
  }

  function BoundaryNodeType(props) {
    var data = props.data;
    return h('div', { style: { '--node-color': data.color, width: data.width, height: data.height, border: '2px dashed color-mix(in srgb, var(--node-color) 25%, transparent)', borderRadius: 16, background: 'color-mix(in srgb, var(--node-color) 4%, transparent)', position: 'relative' } },
      h('div', { style: { position: 'absolute', top: 8, left: 12, fontSize: 11, fontWeight: 600, color: 'color-mix(in srgb, var(--node-color) 67%, transparent)', fontFamily: 'var(--font-mono)', textTransform: 'uppercase', letterSpacing: '0.05em' } }, data.label)
    );
  }

  var nodeTypes = { container: ContainerNodeType, external: ExternalNodeType, boundary: BoundaryNodeType };

  return function C4ContainerDiagram(props) {
    var config = props.config || {};
    var items = props.items || {};
    var onDrillDown = props.onDrillDown;
    var onInspect = props.onInspect;

    var containerKind = config.containerKind || 'architecture.container';
    var systemKind = config.systemKind || 'architecture.system';
    var externalKind = config.externalSystemKind || 'architecture.external-system';
    var containerColor = config.containerColor || '#6366f1';
    var systemColor = config.systemColor || '#6366f1';
    var externalColor = config.externalColor || '#94a3b8';

    var legendState = useState({});
    var hiddenKinds = legendState[0];
    var setHiddenKinds = legendState[1];

    function toggleKind(kind) {
      setHiddenKinds(function(prev) {
        var next = Object.assign({}, prev);
        if (next[kind]) delete next[kind];
        else next[kind] = true;
        return next;
      });
    }

    var rawContainers = items[containerKind] || [];
    var systems = items[systemKind] || [];
    var rawExternals = items[externalKind] || [];

    var allContainers = hiddenKinds[containerKind] ? [] : rawContainers;
    var externals = hiddenKinds[externalKind] ? [] : rawExternals;

    var built = useMemo(function() {
      var focusSystem = config.focusRef ? systems.find(function(s) { return s.metadata.uid === config.focusRef; }) : systems[0];
      var containers = focusSystem ? allContainers.filter(function(c) { return c.spec.systemRef === focusSystem.metadata.uid; }) : allContainers;

      var nodes = [];
      var edges = [];
      var kindMap = {};

      var cols = Math.max(Math.min(containers.length, 3), 1);
      var rows = Math.ceil(containers.length / cols);
      var gridW = cols * COL_SPACING;
      var gridH = rows * ROW_SPACING;
      var bW = gridW + BOUNDARY_PAD * 2;
      var bH = gridH + BOUNDARY_PAD * 2 + 30;
      var cx = 400;
      var cy = 300;
      var bX = cx - bW / 2;
      var bY = cy - bH / 2;

      if (focusSystem) {
        nodes.push({ id: 'boundary-' + config.focusRef, type: 'boundary', position: { x: bX, y: bY }, data: { label: getName(focusSystem) + ' [Software System]', color: systemColor, width: bW, height: bH }, draggable: false, selectable: false, style: { zIndex: -1 } });
      }

      containers.forEach(function(c, i) {
        var col = i % cols;
        var row = Math.floor(i / cols);
        var px = bX + BOUNDARY_PAD + col * COL_SPACING + (COL_SPACING - NODE_W) / 2;
        var py = bY + BOUNDARY_PAD + 30 + row * ROW_SPACING;
        nodes.push({ id: c.metadata.uid, type: 'container', position: { x: px, y: py }, data: { label: getName(c), description: c.spec.description, technology: c.spec.technology, color: containerColor, stereotype: 'Container' } });
        kindMap[c.metadata.uid] = containerKind;
        (c.spec.usesRefs || []).forEach(function(ref) { edges.push(makeEdge(c.metadata.uid, ref)); });
      });

      var extSpacing = 280;
      var extStartX = cx - ((externals.length - 1) * extSpacing) / 2 - NODE_W / 2;
      externals.forEach(function(ext, i) {
        nodes.push({ id: ext.metadata.uid, type: 'external', position: { x: extStartX + i * extSpacing, y: bY + bH + 80 }, data: { label: getName(ext), description: ext.spec.description, technology: ext.spec.technology, color: externalColor, stereotype: 'External System' } });
        kindMap[ext.metadata.uid] = externalKind;
      });

      return { nodes: nodes, edges: edges, kindMap: kindMap };
    }, [allContainers, systems, externals, config.focusRef]);

    var nodesState = useNodesState(built.nodes);
    var edgesState = useEdgesState(built.edges);
    var nodes = nodesState[0], setNodes = nodesState[1], onNodesChange = nodesState[2];
    var edges = edgesState[0], setEdges = edgesState[1], onEdgesChange = edgesState[2];

    useEffect(function() { setNodes(built.nodes); }, [built.nodes]);
    useEffect(function() { setEdges(built.edges); }, [built.edges]);

    var handleNodeClick = useCallback(function(event, node) {
      var kind = built.kindMap[node.id];
      if (!kind) return;
      if (onDrillDown) onDrillDown(node.id, kind);
      else if (onInspect) onInspect(node.id, kind);
    }, [built.kindMap, onDrillDown, onInspect]);

    if (!rawContainers.length && !rawExternals.length) {
      return h('div', { className: 'flex items-center justify-center h-64 text-muted-foreground text-sm' }, 'No containers found.');
    }

    var totalFiltered = allContainers.length + externals.length;

    return h('div', { style: { position: 'relative', width: '100%', height: 'calc(100vh - 220px)', minHeight: 400 } },
      h('div', { className: 'absolute top-3 left-3 z-20 bg-background/80 backdrop-blur-sm rounded-lg px-3 py-1.5 border border-border/50 shadow-sm flex items-center gap-2 flex-wrap' },
        h('button', { onClick: function() { toggleKind(containerKind); }, className: 'flex items-center gap-1.5 transition-opacity ' + (hiddenKinds[containerKind] ? 'opacity-30' : 'opacity-100') + ' hover:opacity-70', style: { cursor: 'pointer', background: 'none', border: 'none', padding: 0 } },
          h('div', { className: 'w-2 h-2 rounded-full', style: { backgroundColor: containerColor } }),
          h('span', { className: 'text-[11px] font-mono text-muted-foreground select-none' }, rawContainers.length + ' container' + (rawContainers.length !== 1 ? 's' : ''))
        ),
        h('button', { onClick: function() { toggleKind(externalKind); }, className: 'flex items-center gap-1.5 transition-opacity ' + (hiddenKinds[externalKind] ? 'opacity-30' : 'opacity-100') + ' hover:opacity-70', style: { cursor: 'pointer', background: 'none', border: 'none', padding: 0 } },
          h('div', { className: 'w-2 h-2 rounded-full', style: { backgroundColor: externalColor } }),
          h('span', { className: 'text-[11px] font-mono text-muted-foreground select-none' }, rawExternals.length + ' external' + (rawExternals.length !== 1 ? 's' : ''))
        ),
        h('span', { className: 'text-[11px] text-border mx-0.5 select-none' }, '|'),
        h('span', { className: 'text-[11px] font-mono text-muted-foreground select-none' }, totalFiltered + ' total')
      ),
      h('div', { className: 'c4-diagram-canvas', style: { width: '100%', height: '100%' } },
        h(ReactFlow, { nodes: nodes, edges: edges, onNodesChange: onNodesChange, onEdgesChange: onEdgesChange, onNodeClick: handleNodeClick, nodeTypes: nodeTypes, fitView: true, fitViewOptions: { padding: 0.3 }, proOptions: { hideAttribution: true }, minZoom: 0.3, maxZoom: 2 },
          h(Background, { variant: 'dots', gap: 24, size: 1, color: 'hsl(var(--canvas-dots) / 0.2)' })
        )
      )
    );
  };
