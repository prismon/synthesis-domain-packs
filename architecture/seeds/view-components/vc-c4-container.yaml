apiVersion: synthesis/v1
kind: system.view-component
metadata:
  name: vc-c4-container
spec:
  displayName: "C4 Container Diagram"
  description: "C4 model Level 2 — shows containers within a system"
  layoutType: c4-container
  icon: boxes
  componentKind: inline-react
  requiredFields:
    - name: systemRef
      type: ref
  defaultLayoutConfig:
    containerKind: architecture.container
    systemKind: architecture.system
    externalSystemKind: architecture.external-system
  defaultItemGroup:
    kinds:
      - architecture.container
      - architecture.system
      - architecture.external-system
  defaultDrillDown:
    - nodeKind: architecture.container
      targetViewComponent: vc-c4-component
markdown: |
  var h = React.createElement;

  function getName(item) { return item.spec.displayName || item.metadata.name; }

  function resolveRefs(refs, allItems) {
    if (!refs || !refs.length) return [];
    var result = [];
    for (var i = 0; i < allItems.length; i++) {
      if (refs.indexOf(allItems[i].metadata.uid) !== -1) result.push(allItems[i]);
    }
    return result;
  }

  return function C4ContainerDiagram(props) {
    var config = props.config;
    var items = props.items;
    var onDrillDown = props.onDrillDown;
    var onInspect = props.onInspect;

    var containerKind = config.containerKind || 'architecture.container';
    var systemKind = config.systemKind || 'architecture.system';
    var externalKind = config.externalSystemKind || 'architecture.external-system';

    var containers = (items && items[containerKind]) || [];
    var systems = (items && items[systemKind]) || [];
    var externals = (items && items[externalKind]) || [];
    var allItems = containers.concat(systems).concat(externals);

    var focusSystem = config.focusRef
      ? systems.find(function(s) { return s.metadata.uid === config.focusRef; })
      : systems[0];

    var boundaryContainers = focusSystem
      ? containers.filter(function(c) { return c.spec.systemRef === focusSystem.metadata.uid; })
      : containers;

    function handleClick(item) {
      if (onDrillDown) onDrillDown(item.metadata.uid, item.kind);
      else if (onInspect) onInspect(item.metadata.uid, item.kind);
    }

    if (!containers.length && !externals.length) {
      return h('div', { className: 'flex items-center justify-center h-64 text-muted-foreground text-sm' },
        'No containers found.'
      );
    }

    return h('div', { className: 'flex flex-col items-center gap-8 p-6' },
      focusSystem ? h('div', { className: 'w-full max-w-4xl' },
        h('div', {
          className: 'rounded-xl border-2 border-dashed border-indigo-300/50 bg-indigo-50/5 p-6'
        },
          h('div', { className: 'text-xs font-semibold uppercase tracking-wider text-indigo-400 mb-4' },
            getName(focusSystem) + ' [Software System]'
          ),
          h('div', { className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4' },
            boundaryContainers.map(function(c) {
              var usesNames = resolveRefs(c.spec.usesRefs, allItems).map(getName);
              return h('div', {
                key: c.metadata.uid,
                className: 'rounded-lg border bg-card p-4 cursor-pointer transition-shadow hover:shadow-lg',
                style: { borderTopWidth: '3px', borderTopColor: '#6366f1' },
                onClick: function() { handleClick(c); }
              },
                h('div', { className: 'text-[10px] uppercase tracking-wider text-muted-foreground mb-1' }, 'Container'),
                h('div', { className: 'text-sm font-semibold mb-1' }, getName(c)),
                c.spec.description ? h('div', { className: 'text-xs text-muted-foreground line-clamp-2 mb-2' }, c.spec.description) : null,
                c.spec.technology ? h('div', { className: 'text-[10px] text-muted-foreground mb-2' }, '[' + c.spec.technology + ']') : null,
                usesNames.length ? h('div', { className: 'flex flex-wrap gap-1' },
                  usesNames.map(function(name) {
                    return h('span', { key: name, className: 'text-[10px] bg-muted rounded px-1.5 py-0.5' }, 'uses ' + name);
                  })
                ) : null
              );
            })
          )
        )
      ) : null,

      externals.length ? h('div', null,
        h('div', { className: 'text-xs font-semibold uppercase tracking-wider text-muted-foreground text-center mb-3' }, 'External Systems'),
        h('div', { className: 'flex flex-wrap justify-center gap-4' },
          externals.map(function(e) {
            return h('div', {
              key: e.metadata.uid,
              className: 'rounded-lg border bg-card p-4 cursor-pointer transition-shadow hover:shadow-md w-48',
              style: { borderTopWidth: '3px', borderTopColor: '#94a3b8' },
              onClick: function() { handleClick(e); }
            },
              h('div', { className: 'text-[10px] uppercase tracking-wider text-muted-foreground mb-1' }, 'External System'),
              h('div', { className: 'text-sm font-semibold' }, getName(e))
            );
          })
        )
      ) : null
    );
  };
