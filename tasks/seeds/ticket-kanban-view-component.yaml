apiVersion: synthesis/v1
kind: tasks.ticket
metadata:
  name: ticket-kanban-view-component
spec:
  displayName: "Build TaskKanban view component"
  status: in-progress
  priority: p1
  issueType: story
  storyPoints: 5
  sprint: "Sprint 12"
  labels:
    - frontend
    - views
  componentRefs:
    - "!name ss-view-renderer"
  acceptanceCriteria: |
    - Kanban columns rendered from `layoutConfig.statusColumns`
    - Priority badge visible on each card (P0-P4)
    - Flagged tasks show a flag icon
    - Empty columns show a subtle placeholder
  reporter: "josh"
  lifecycleState: active
