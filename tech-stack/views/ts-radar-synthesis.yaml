apiVersion: synthesis/v1
kind: system.view
metadata:
  name: ts-radar-synthesis
spec:
  displayName: "Synthesis Tech Radar"
  description: "FIRE technology radar showing all technologies in the Synthesis tech stack"
  itemGroup:
    kinds:
      - tech-stack.language
      - tech-stack.library
      - tech-stack.service
      - tech-stack.blueprint
      - architecture.capability
  viewComponentRef: "!name vc-tech-radar"
  focusRef: "!name synthesis-tech-stack"
  focusKind: tech-stack.tech-stack
  layoutConfig:
    focusTechStackName: synthesis-tech-stack
    techStackRefField: techStackRef
    rings:
      - name: fix
        label: "Fix"
        color: "#22c55e"
      - name: invest
        label: "Invest"
        color: "#3b82f6"
      - name: reduce
        label: "Reduce"
        color: "#f59e0b"
      - name: eliminate
        label: "Eliminate"
        color: "#ef4444"
    quadrants:
      - kind: tech-stack.blueprint
        label: "Blueprints & Patterns"
      - kind: tech-stack.library
        label: "Libraries"
      - kind: tech-stack.service
        label: "Services"
      - kind: tech-stack.language
        label: "Languages"
    capabilityKind: architecture.capability
    approvedColor: "#22c55e"
    approvedWithUseCaseColor: "#f59e0b"
    notApprovedColor: "#ef4444"
