apiVersion: synthesis/v1
kind: tech-stack.service
metadata:
  name: ts-postgresql
spec:
  displayName: "PostgreSQL"
  useCaseRef: "!name uc-synthesis-services"
  ring: Invest
  serviceType: self-hosted
  version: "16"
  license: "PostgreSQL"
  openSourceAdoption: widely-adopted
  cveCount: 0
  strengths:
    - "Row-level security for multi-tenancy"
    - "JSONB for flexible spec storage"
    - "ACID transactions"
  description: "Primary data store with RLS-based multi-tenancy"
