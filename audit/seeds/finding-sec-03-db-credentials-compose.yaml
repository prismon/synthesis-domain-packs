apiVersion: synthesis/v1
kind: audit.finding
metadata:
  name: finding-sec-03-db-credentials-compose
spec:
  displayName: "SEC-03: Hardcoded Database Credentials in docker-compose.yml"
  severity: warning
  category: security
  description: "PostgreSQL credentials (username and password) are hardcoded in docker-compose.yml and committed to version control. Any developer with repository access can obtain database credentials."
  recommendation: "Use a .env file (gitignored) or Docker secrets to supply credentials. Reference ${POSTGRES_PASSWORD} style variables in docker-compose.yml instead of literal values."
  sourceFile: "docker-compose.yml"
  status: open
  lifecycleState: identified
  systemRef: "!name synthesis"
  containerRef: "!name ss-backend"
