markdown: |
  # Backend API — MCP Tool Reference

  ## Overview
  The backend exposes 27 MCP tools and 1 HTTP endpoint. Tools are registered in
  `backend/internal/mcpserver/server.go` (core) and `backend/enterprise/tools/` (enterprise).

  ## Core Domain Tools (16)
  All read operations require `tenant_user`. All write operations require `tenant_admin`.

  ### Definition Management
  - `list_definitions` — List all definitions
  - `get_definition(uid)` — Get single definition
  - `create_definition(name, displayName, ...)` — Create definition
  - `update_definition(uid, version, ...)` — Update with optimistic concurrency
  - `delete_definition(uid)` — Delete definition

  ### Item Management
  - `list_items(kind)` — List items by kind
  - `get_item(uid)` — Get single item
  - `create_item(kind, name, spec)` — Create item
  - `update_item(uid, version, ...)` — Update item
  - `delete_item(uid)` — Delete item
  - `export_item(uid)` — Export as markdown/YAML
  - `import_item(content)` — Import from markdown/YAML

  ### Graph & References
  - `query_graph(startUid, direction?, depth?, refKinds?)` — Graph traversal
  - `add_reference(sourceUid, refKind, targetUid)` — Add typed edge
  - `remove_reference(sourceUid, refKind, targetUid)` — Remove edge

  ### Traits
  - `list_traits` — List all trait definitions

  ## Git Plugin Tools (2)
  - `sync_git_repository(owner, repo)` — Sync GitHub repo as domain items
  - `analyze_git_repository(repositoryName)` — Returns analysis recipe

  ## Enterprise Tools (11, build tag: enterprise)
  ### Metrics & Digital Twins
  - `enterprise_record_observation`, `enterprise_query_metrics`, `enterprise_list_observations`
  - `enterprise_create_twin_snapshot`, `enterprise_simulate_twin`, `enterprise_evaluate_twin`

  ### Rules & Agents
  - `execute_enterprise_rule`, `evaluate_enterprise_rule`
  - `enterprise_list_execution_logs`
  - `chat_sandbox_session`, `list_sandbox_session`

  ## HTTP Endpoints
  - `GET /agent/stream/{streamId}` — SSE stream for agent responses (enterprise)
  - `GET /healthz` — Health check (no auth)
  - `GET /readyz` — Readiness check (no auth)
  - `GET /.well-known/oauth-authorization-server` — OIDC discovery (no auth)
