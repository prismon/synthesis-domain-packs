apiVersion: synthesis/v1
kind: audit.finding
metadata:
  name: finding-sec-01-keycloak-credentials
spec:
  displayName: "SEC-01: Hardcoded Keycloak Admin Credentials in Git"
  severity: critical
  category: security
  description: "Keycloak admin credentials are hardcoded in instances/demo.yaml and committed to the repository. Any developer or attacker with repository access can obtain these credentials and gain full administrative control over the Keycloak realm."
  recommendation: "Remove credentials from source control immediately. Use environment variables or a secrets manager (e.g. Vault, AWS Secrets Manager) to inject credentials at runtime. Rotate the exposed credentials."
  sourceFile: "instances/demo.yaml"
  status: open
  lifecycleState: identified
  systemRef: "!name synthesis"
  containerRef: "!name ss-backend"
