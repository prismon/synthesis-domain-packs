markdown: |
  # Security Model

  ## Authentication

  ### Auth Modes
  Three auth modes are supported (configured via `AUTH_MODE` / `VITE_AUTH_MODE` env vars):
  - **`oidc`** — Full OIDC via Keycloak. Supports multi-realm (subdomain routing) and
    single-issuer modes. JWT validated server-side; role from `role` claim.
  - **`oidc-stub`** — Lightweight OIDC stub for testing without a full Keycloak deployment.
  - **`header`** — No OIDC; backend trusts `X-Tenant-ID`, `X-Tenant-Slug` headers directly.
    Used for local development and E2E tests. Role is `tenant_admin` for registered tenants.
    **Never use in production.**

  ### OIDC Resolver Modes (within `oidc` auth mode, in priority order)
  1. **Multi-realm OIDC** — `OIDC_ISSUER_URL` contains `{realm}` placeholder.
     Uses `MultiRealmJWTResolver`. Extracts realm from JWT issuer, verifies
     tenant registration, resolves role from People domain items.
  2. **Single-issuer OIDC** — `OIDC_ISSUER_URL` set without `{realm}`.
     Uses `JWTResolver`. Tenant from `org_id` claim, role from `role` claim.

  ## Authorization

  ### Role Model
  | Role | Read | Write | Admin | Platform |
  |---|---|---|---|---|
  | `tenant_user` | Yes | No | No | No |
  | `tenant_admin` | Yes | Yes | Yes | No |
  | `platform_admin` | Yes | Yes | Yes | Yes |

  ### Enforcement Points
  - `requireWrite(ctx)` — gates all Create/Update/Delete operations
  - `canWriteTenantDomain(ctx)` — gates tenant registry writes (platform_admin only)
  - Read operations have NO permission check (all authenticated users can read)

  ### Impersonation
  `X-Impersonate-Role` header allows platform_admin to downgrade to lower roles.
  Escalation is prevented (only downgrades honored).

  ## Tenant Isolation
  - **Database**: PostgreSQL RLS with `FORCE ROW LEVEL SECURITY` enforced on all tables
  - **Application**: `tenant.Middleware` sets tenant context per request
  - **Session**: `app.tenant_id` set via `set_config()` per transaction

  ## Sandbox Isolation
  Each sandbox session runs in an isolated Docker container managed by `internal/sandboxplugin/`.
  Containers have resource limits and network isolation. Sessions are `system.session` items;
  the container lifecycle is tied to session state transitions.

  ## Known Gaps
  - Header auth mode trusts client-supplied role/tier headers — not safe outside dev
  - Frontend has no RBAC — all UI elements visible to all authenticated users
  - No rate limiting on MCP endpoints
  - Lifecycle state transitions are modeled but not enforced server-side
