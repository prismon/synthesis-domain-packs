apiVersion: synthesis/v1
kind: audit.finding
metadata:
  name: finding-keycloak-passwords-in-compose
spec:
  displayName: "Keycloak Admin and DB Passwords Hardcoded in Docker Compose"
  severity: warning
  category: security
  description: "docker-compose.keycloak.yml contains hardcoded passwords: KEYCLOAK_ADMIN_PASSWORD and KC_DB_PASSWORD are committed to version control. While these are development credentials, they establish a pattern that could leak into production configurations."
  recommendation: "Move all passwords to .env files that are gitignored. Use Docker secrets or environment variable injection for production. Add .env.example with placeholder values as documentation."
  sourceFile: "synthesis-keycloak/docker-compose.yml"
  status: open
  lifecycleState: identified
  systemRef: "!name synthesis"
