apiVersion: synthesis/v1
kind: audit.api-endpoint
metadata:
  name: api-synthesis-validate-branch
spec:
  displayName: "Synthesis Validate Branch"
  endpointType: mcp-tool
  toolName: "validate_synthesis_branch"
  parameters:
