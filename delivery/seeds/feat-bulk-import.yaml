apiVersion: synthesis/v1
kind: delivery.feature
metadata:
  name: feat-bulk-import
spec:
  displayName: "Bulk YAML Import"
  description: "Import multiple domain items from YAML files or clipboard paste, with validation against the resolved schema."
  segmentRef: "!name seg-item-crud"
