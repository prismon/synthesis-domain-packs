apiVersion: synthesis/v1
kind: system.view-component
metadata:
  name: vc-context-map
spec:
  displayName: "Context Map"
  description: "DDD context map showing bounded context relationships and anti-corruption layers"
  layoutType: context-map
  icon: map
  componentKind: inline-react
markdown: |
  var h = React.createElement;
  var CTX_W = 240;
  var CTX_H = 140;
  var COL_SPACING = 300;
  var ROW_SPACING = 220;
  var EDGE_STYLE = { stroke: 'hsl(var(--diagram-edge, 215 20% 65%))', strokeWidth: 1.5, strokeDasharray: '6 3', vectorEffect: 'non-scaling-stroke' };

  function getName(item) { return item.spec.displayName || item.metadata.name; }

  var HANDLE_STYLE = { background: 'transparent', border: 0, width: 12, height: 12 };

  function AllHandles() {
    return h(React.Fragment, null,
      h(Handle, { type: 'target', position: Position.Top, style: HANDLE_STYLE }),
      h(Handle, { type: 'source', position: Position.Bottom, style: HANDLE_STYLE }),
      h(Handle, { type: 'target', position: Position.Left, id: 'left', style: HANDLE_STYLE }),
      h(Handle, { type: 'source', position: Position.Right, id: 'right', style: HANDLE_STYLE })
    );
  }

  function ContextNodeType(props) {
    var data = props.data;
    return h('div', { style: { '--node-color': data.color, width: CTX_W, minHeight: CTX_H, background: 'color-mix(in srgb, var(--node-color) 10%, transparent)', border: '2px solid color-mix(in srgb, var(--node-color) 38%, transparent)', borderRadius: 12, padding: '14px 16px', textAlign: 'center', color: 'hsl(var(--foreground))' } },
      h(AllHandles),
      h('div', { style: { fontSize: 9, opacity: 0.6, fontStyle: 'italic', marginBottom: 4 } }, '\u00ABbounded context\u00BB'),
      h('div', { style: { fontSize: 14, fontWeight: 600, lineHeight: 1.3 } }, data.label),
      data.description ? h('div', { style: { fontSize: 11, opacity: 0.75, marginTop: 8, lineHeight: 1.4 } }, data.description) : null,
      data.aggregateCount > 0 ? h('div', { style: { fontSize: 10, opacity: 0.5, marginTop: 8 } }, data.aggregateCount + ' aggregate' + (data.aggregateCount !== 1 ? 's' : '')) : null
    );
  }

  function AclNodeType(props) {
    var data = props.data;
    return h('div', { style: { '--node-color': data.color, width: 160, background: 'color-mix(in srgb, var(--node-color) 10%, transparent)', border: '1.5px dashed color-mix(in srgb, var(--node-color) 38%, transparent)', borderRadius: 8, padding: '8px 12px', textAlign: 'center', color: 'hsl(var(--foreground))' } },
      h(AllHandles),
      h('div', { style: { fontSize: 9, opacity: 0.6, fontStyle: 'italic' } }, '\u00ABACL\u00BB'),
      h('div', { style: { fontSize: 11, fontWeight: 600 } }, data.label)
    );
  }

  function IntegrationEdgeType(props) {
    var pathResult = getBezierPath({ sourceX: props.sourceX, sourceY: props.sourceY, targetX: props.targetX, targetY: props.targetY, sourcePosition: props.sourcePosition, targetPosition: props.targetPosition });
    var edgePath = pathResult[0], labelX = pathResult[1], labelY = pathResult[2];
    return h(React.Fragment, null,
      h(BaseEdge, { id: props.id, path: edgePath, markerEnd: props.markerEnd, style: EDGE_STYLE }),
      props.data && props.data.label ? h('foreignObject', { width: 120, height: 30, x: labelX - 60, y: labelY - 15 },
        h('div', { style: { fontSize: 10, textAlign: 'center', color: 'hsl(var(--diagram-edge-label, 215 15% 55%))', background: 'hsl(var(--canvas-bg-via, 0 0% 100%))', padding: '2px 6px', borderRadius: 4, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, props.data.label)
      ) : null
    );
  }

  var nodeTypes = { context: ContextNodeType, acl: AclNodeType };
  var edgeTypes = { integration: IntegrationEdgeType };

  return function ContextMap(props) {
    var config = props.config || {};
    var items = props.items || {};
    var onDrillDown = props.onDrillDown;
    var onInspect = props.onInspect;

    var contextKind = config.contextKind || (config.domainRefs && config.domainRefs[0]) || 'modeling.bounded-context';
    var aclKind = config.aclKind || 'modeling.anti-corruption-layer';
    var aggregateKind = config.aggregateKind || 'modeling.aggregate';
    var contextColor = config.contextColor || '#6366f1';
    var aclColor = config.aclColor || '#f59e0b';

    var contexts = items[contextKind] || [];
    var acls = items[aclKind] || [];
    var aggregates = items[aggregateKind] || [];

    var built = useMemo(function() {
      var nodes = [];
      var edges = [];
      var kindMap = {};

      var aggCounts = {};
      aggregates.forEach(function(agg) {
        var ref = agg.spec.boundedContextRef;
        if (ref) aggCounts[ref] = (aggCounts[ref] || 0) + 1;
      });

      var cols = Math.max(Math.min(contexts.length, 3), 1);
      var ctxPositions = {};

      contexts.forEach(function(ctx, i) {
        var col = i % cols;
        var row = Math.floor(i / cols);
        var x = col * COL_SPACING;
        var y = row * ROW_SPACING;
        ctxPositions[ctx.metadata.name] = { x: x, y: y };
        nodes.push({ id: ctx.metadata.name, type: 'context', position: { x: x, y: y }, data: { label: getName(ctx), description: ctx.spec.description, showDescription: config.showDescriptions !== false, color: contextColor, aggregateCount: aggCounts[ctx.metadata.name] || 0 } });
        kindMap[ctx.metadata.name] = contextKind;
      });

      acls.forEach(function(acl) {
        var upstream = acl.spec.upstreamContextRef;
        var downstream = acl.spec.downstreamContextRef;
        if (!upstream || !downstream) return;
        var upPos = ctxPositions[upstream];
        var downPos = ctxPositions[downstream];
        if (!upPos || !downPos) return;

        var midX = (upPos.x + downPos.x) / 2 + CTX_W / 2 - 80;
        var midY = (upPos.y + downPos.y) / 2 + CTX_H / 2 + 30;

        nodes.push({ id: acl.metadata.name, type: 'acl', position: { x: midX, y: midY }, data: { label: getName(acl), color: aclColor } });
        kindMap[acl.metadata.name] = aclKind;

        edges.push({ id: upstream + '->' + acl.metadata.name, source: upstream, target: acl.metadata.name, type: 'integration', data: { label: 'upstream' }, markerEnd: { type: MarkerType.ArrowClosed } });
        edges.push({ id: acl.metadata.name + '->' + downstream, source: acl.metadata.name, target: downstream, type: 'integration', data: { label: 'translated' }, markerEnd: { type: MarkerType.ArrowClosed } });
      });

      return { nodes: nodes, edges: edges, kindMap: kindMap };
    }, [contexts, acls, aggregates]);

    var nodesState = useNodesState(built.nodes);
    var edgesState = useEdgesState(built.edges);
    var nodes = nodesState[0], setNodes = nodesState[1], onNodesChange = nodesState[2];
    var edges = edgesState[0], setEdges = edgesState[1], onEdgesChange = edgesState[2];

    useEffect(function() { setNodes(built.nodes); }, [built.nodes]);
    useEffect(function() { setEdges(built.edges); }, [built.edges]);

    var handleNodeClick = useCallback(function(event, node) {
      var kind = built.kindMap[node.id];
      if (!kind) return;
      if (onDrillDown) onDrillDown(node.id, kind);
      else if (onInspect) onInspect(node.id, kind);
    }, [built.kindMap, onDrillDown, onInspect]);

    if (!contexts.length) {
      return h('div', { className: 'flex items-center justify-center h-64 text-muted-foreground text-sm' }, 'No bounded contexts found.');
    }

    return h('div', { className: 'c4-diagram-canvas', style: { width: '100%', height: 'calc(100vh - 220px)', minHeight: 400 } },
      h(ReactFlow, { nodes: nodes, edges: edges, onNodesChange: onNodesChange, onEdgesChange: onEdgesChange, onNodeClick: handleNodeClick, nodeTypes: nodeTypes, edgeTypes: edgeTypes, fitView: true, fitViewOptions: { padding: 0.3 }, proOptions: { hideAttribution: true }, minZoom: 0.3, maxZoom: 2 },
        h(Background, { variant: 'dots', gap: 24, size: 1, color: 'hsl(var(--canvas-dots) / 0.2)' })
      )
    );
  };
