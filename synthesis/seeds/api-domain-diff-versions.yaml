apiVersion: synthesis/v1
kind: audit.api-endpoint
metadata:
  name: api-domain-diff-versions
spec:
  displayName: "Domain Diff Versions"
  endpointType: mcp-tool
  toolName: "diff_version"
  parameters:
    required: [uid, fromVersion, toVersion]
    optional: []
  description: "Computes a field-level diff between two versions of a domain item."
  permissionRequired: tenant_user
  componentRef: "!name ss-mcp-server"
