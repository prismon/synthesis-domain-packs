apiVersion: synthesis/v1
kind: audit.finding
metadata:
  name: finding-agent-api-key-empty
spec:
  displayName: "Agent API Key Hardcoded Empty"
  severity: critical
  category: security
  description: "Agent API key hardcoded empty in enterprise/agent/chat.go line 139, option.WithAPIKey(\"\"). Anthropic API key not loaded from config."
