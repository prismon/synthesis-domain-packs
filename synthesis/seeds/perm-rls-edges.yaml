apiVersion: synthesis/v1
kind: audit.permission
metadata:
  name: perm-rls-edges
spec:
  displayName: "RLS on Domain Edges"
  permissionType: rls
  enforcementPoint: "migrations/002_domain_edges.up.sql"
  roleRequired: tenant_user
  description: "Row-level security on domain_edges table isolates data by tenant_id via current_setting('app.tenant_id')"
  componentRef: "!name ss-repository"
  containerRef: "!name ss-database"
