apiVersion: synthesis/v1
kind: audit.design-pattern
metadata:
  name: pattern-view-registry
spec:
  displayName: "View Registry and Renderer"
  patternCategory: architectural
  description: "Views are registered in a singleton ViewRegistry with inline-react (primary/recommended), react (legacy), and web-component renderer types. 30+ built-in view components are registered at startup covering C4 diagrams, hierarchy board, class diagram, context map, application landscape, audit findings table, and more. Enterprise plugins add web-component or inline-react views at startup via loadPlugins(). ViewRenderer dispatches to the correct renderer based on layoutType. All new view development should use inline-react."
  componentRefs:
    - "!name ss-view-renderer"
  containerRefs:
    - "!name ss-frontend"
