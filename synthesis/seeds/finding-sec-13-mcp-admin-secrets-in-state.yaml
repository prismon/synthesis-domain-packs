apiVersion: synthesis/v1
kind: audit.finding
metadata:
  name: finding-sec-13-mcp-admin-secrets-in-state
spec:
  displayName: "SEC-13: MCP Server Admin Form Retains Secrets in React State"
  severity: warning
  category: security
  description: "The McpServersAdmin page stores bearer tokens, OIDC client secrets, and HTTP header values in React component state. These values persist in memory after form submission and are visible via React DevTools. If the browser tab remains open or the component is inspected, credentials are exposed."
  recommendation: "Clear sensitive form fields (bearerToken, oidcClientSecret) from state immediately after successful submission. Consider using a ref for transient secret values rather than controlled state."
  sourceFile: "src/pages/McpServersAdmin.tsx"
  status: open
  lifecycleState: identified
  systemRef: "!name synthesis"
  containerRef: "!name ss-frontend"
