markdown: |
  # Backend API — MCP Tool Reference

  ## Overview
  The backend exposes 80+ MCP tools registered in `backend/internal/mcpserver/server.go`
  (core) and `backend/enterprise/tools/` (enterprise). Tools are organized across the
  following categories: definition management, item CRUD, graph and references, review,
  changeset, version history, notebook, scheduler, runner, project, git, context and session,
  MCP registry, controller, sandbox, thread, and enterprise (rules and metrics).

  ## Core Domain Tools
  All read operations require `tenant_user`. All write/admin operations require `tenant_admin`.

  ### Definition Management (5)
  `list_definition`, `get_definition`, `create_definition`, `update_definition`, `delete_definition`

  ### Item CRUD (8)
  `list_items`, `get_item`, `create_item`, `update_item`, `delete_item`, `detach_item`,
  `export_item`, `import_item`

  ### Graph & References (4)
  `query_graph`, `list_schema_neighbor`, `add_reference`, `remove_reference`

  ### Traits (1)
  `list_trait`

  ### Review (5)
  `list_review_change`, `get_review_change`, `approve_review_change`, `reject_review_change`,
  `list_my_review_change`

  ### ChangeSet (4)
  `approve_changeset`, `reject_changeset`, `approve_changeset_item`, `reject_changeset_item`

  ### Version History (3)
  `list_version`, `get_version`, `diff_version`

  ### Notebook (4)
  `notebook_run`, `notebook_cancel_run`, `notebook_list_runs`, `notebook_get_run`

  ### Team (1)
  `send_gate_feedback`

  ### Scheduler (5)
  `scheduler_list_jobs`, `scheduler_create_job`, `scheduler_update_job`, `scheduler_delete_job`,
  `scheduler_trigger_job`

  ### Runner — Deprecated (3)
  `execute_item`, `cancel_run`, `approve_run_gate` — superseded by notebook_* tools

  ### Domain Pack (3)
  `load_domain_sample`, `preview_domain_pack`, `load_domain_seeds` (deprecated)

  ### Project — tenant_admin (4)
  `create_project`, `import_project`, `reload_system_project`, `sync_system_project`

  ### Git (6)
  `git_status`, `git_commit`, `git_push`, `git_pull`, `git_log`, `git_diff`

  ### Context & Session (3)
  `generate_synthesis_context`, `resolve_synthesis_budget`, `get_synthesis_session`

  ### Validation (1)
  `validate_synthesis_branch`

  ### MCP Registry — tenant_admin (3)
  `proxy_mcp_call`, `refresh_mcp_server`, `get_mcp_server_status`

  ### Controller — tenant_admin (2)
  `get_controller_status`, `reconcile_controller`

  ## Sandbox & Thread Tools (ss-sandbox-orchestrator component)
  ### Sandbox (7)
  `launch_sandbox_session`, `terminate_sandbox_session`, `get_sandbox_status`,
  `list_sandbox_session`, `post_sandbox_message`, `update_sandbox_message`, `chat_sandbox_session`

  ### Thread (5)
  `get_thread`, `list_threads`, `seal_thread`, `submit_thread_for_review`, `dispose_thread`

  ## Enterprise Tools (9, build tag: enterprise, ss-enterprise-engine component)
  ### Rules (3)
  `execute_enterprise_rule`, `evaluate_enterprise_rule`, `list_enterprise_execution_log`

  ### Metrics & Digital Twins (6)
  `record_enterprise_observation`, `query_enterprise_metric`, `list_enterprise_observation`,
  `create_enterprise_twin_snapshot`, `simulate_enterprise_twin`, `evaluate_enterprise_twin`

  ## HTTP Endpoints
  - `GET /healthz` — Health check (no auth)
  - `GET /readyz` — Readiness check (no auth)
  - `GET /.well-known/oauth-authorization-server` — OIDC discovery (no auth)
