apiVersion: synthesis/v1
kind: system.view
metadata:
  name: mbse-needs-traceability
spec:
  displayName: "Needs Traceability"
  description: "Stakeholder needs with derived requirements traceability — the top of the V-model"
  itemGroup:
    kinds:
      - mbse.stakeholder-need
      - mbse.requirement
  viewComponentRef: "!name vc-hierarchy-board"
  layoutConfig:
    levels:
      - kind: mbse.stakeholder-need
        label: "Stakeholder Needs"
        color: "#0891b2"
      - kind: mbse.requirement
        label: "Derived Requirements"
        color: "#0d9488"
    refChain:
      - from: mbse.requirement
        field: derivedFromNeeds
        to: mbse.stakeholder-need
    showRelationships: true
    expandByDefault: true
  drillDown:
    - nodeKind: mbse.stakeholder-need
      targetViewName: mbse-requirements-table
    - nodeKind: mbse.requirement
      targetViewName: mbse-requirements-table
