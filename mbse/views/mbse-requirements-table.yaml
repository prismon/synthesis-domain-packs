apiVersion: synthesis/v1
kind: system.view
metadata:
  name: mbse-requirements-table
spec:
  displayName: "Requirements Traceability Matrix"
  description: "Coverage matrix showing requirement satisfaction and verification status with color-coded coverage bars, gap analysis, and filtering by traceability status"
  itemGroup:
    kinds:
      - mbse.requirement
      - mbse.block
      - mbse.test-case
      - mbse.stakeholder-need
  viewComponentRef: "!name vc-requirements-traceability"
  layoutConfig:
    requirementKind: mbse.requirement
    blockKind: mbse.block
    testCaseKind: mbse.test-case
    needKind: mbse.stakeholder-need
    requirementColor: "#0d9488"
    satisfiedColor: "#10b981"
    verifiedColor: "#6366f1"
    gapColor: "#ef4444"
