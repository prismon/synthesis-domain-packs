  description: "Coverage matrix showing requirement satisfaction and verification status with color-coded coverage bars, gap analysis, and filtering"
  layoutType: requirements-traceability
  icon: list-checks
  componentKind: web-component
  webComponentTag: synth-requirements-traceability
  webComponentModule: "/domain-assets/mbse/view-components/requirements-traceability.js"
