apiVersion: synthesis/v1
kind: system.view-component
metadata:
  name: vc-activity-diagram
spec:
  displayName: "Activity Diagram"
  description: "SysML Activity Diagram showing functional behaviors with swim lanes per allocated block, activity type shapes, and control flow edges"
  layoutType: activity-diagram
  icon: network
  componentKind: web-component
  webComponentTag: synth-activity-diagram
  webComponentModule: "/domain-assets/mbse/view-components/activity-diagram.js"
  defaultItemGroup:
    kinds:
      - mbse.activity
      - mbse.block
  defaultDrillDown:
    - nodeKind: mbse.activity
      targetViewName: mbse-block-hierarchy
